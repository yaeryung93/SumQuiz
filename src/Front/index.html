<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SumQuiz - AI 요약 + 맞춤 퀴즈</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-wrap">
      <!-- 사이드 소개 패널 -->
      <aside class="intro-panel">
        <div class="logo-row">
          <div class="logo-mark">AI</div>
          <h1>SumQuiz</h1>
        </div>
        <p class="tagline">
          AI 요약 + 맞춤 퀴즈로<br />스마트한 학습을 경험하세요
        </p>

        <ul class="feature-list">
          <li>
            <span class="f-icon">🧠</span>
            <div>
              <strong>AI 요약</strong>
              <small>핵심 내용을 빠르게 정리</small>
            </div>
          </li>
          <li>
            <span class="f-icon">📝</span>
            <div>
              <strong>맞춤 퀴즈</strong>
              <small>이해도에 맞는 퀴즈 자동 생성</small>
            </div>
          </li>
          <li>
            <span class="f-icon">📊</span>
            <div>
              <strong>학습 분석</strong>
              <small>내 학습을 분석하고 성장 확인</small>
            </div>
          </li>
        </ul>

        <nav class="screen-nav" id="screenNav"></nav>
      </aside>

      <!-- 폰 목업 영역 -->
      <main class="stage">
        <div class="phone">
          <div class="notch"></div>
          <div class="status-bar">
            <span>9:41</span>
            <span class="status-icons">●●● ▲ 🔋</span>
          </div>
          <div class="screen-viewport" id="screenViewport">
            <!-- 스크린 삽입 -->
          </div>
          <nav class="bottom-nav" id="bottomNav">
            <button class="nav-item active" data-icon="home">
              <span>🏠</span>홈
            </button>
            <button class="nav-item" data-icon="upload">
              <span>☁️</span>업로드
            </button>
            <button class="nav-item" data-icon="quiz">
              <span>📖</span>퀴즈
            </button>
            <button class="nav-item" data-icon="report">
              <span>📊</span>분석
            </button>
            <button class="nav-item" data-icon="profile">
              <span>👤</span>내정보
            </button>
          </nav>
          <div class="home-indicator"></div>
        </div>

        <div class="stage-controls">
          <button id="prevBtn" aria-label="이전 화면">←</button>
          <span id="screenLabel">1 / 12 · 홈</span>
          <button id="nextBtn" aria-label="다음 화면">→</button>
        </div>
      </main>
    </div>

    <!-- ===================== 화면 템플릿 ===================== -->
    <template id="tpl-1">
      <div class="scr scr-home">
        <div class="greet">
          <div>
            <p class="hi">안녕하세요, 사용자님!</p>
            <p class="hi-sub">오늘도 좋은 하루 되세요 🌱</p>
          </div>
          <div class="avatar">🙂</div>
        </div>

        <section class="card reco-card">
          <p class="card-title">오늘의 학습 추천</p>
          <p class="card-desc">AI가 추천한 학습 자료로 시작해보세요.</p>
          <button class="btn btn-primary sm">시작하기</button>
        </section>

        <p class="section-label">이어서 공부하기</p>
        <section class="card continue-card">
          <div class="file-thumb">📄</div>
          <div class="file-meta">
            <strong>인공지능 개론</strong>
            <small>PDF · 23페이지</small>
            <div class="progress-track">
              <div class="progress-fill" style="width: 60%"></div>
            </div>
          </div>
        </section>

        <p class="section-label">오늘의 학습 통계</p>
        <div class="stat-row">
          <div class="stat-box">
            <small>학습 시간</small>
            <strong>1시간 30분</strong>
          </div>
          <div class="stat-box">
            <small>정답률</small>
            <strong>85%</strong>
          </div>
        </div>
      </div>
    </template>

    <template id="tpl-2">
      <div class="scr scr-upload">
        <h2 class="scr-title">자료 업로드</h2>
        <div class="tab-pill-row">
          <button class="pill active">PDF 업로드</button>
          <button class="pill">링크 업로드</button>
        </div>

        <div class="dropzone">
          <div class="drop-icon">☁️＋</div>
          <p class="drop-main">
            파일을 드래그하거나<br />여기를 클릭하여 업로드
          </p>
          <small class="drop-sub">(PDF, 최대 50MB)</small>
        </div>

        <p class="or-divider">또는 링크를 붙여넣기</p>
        <input class="text-input" placeholder="https://example.com/article" />

        <button class="btn btn-primary block">AI 분석 시작</button>
      </div>
    </template>

    <template id="tpl-3">
      <div class="scr scr-loading">
        <h2 class="scr-title">AI 로딩 화면</h2>
        <div class="spinner-wrap">
          <div class="spinner-ring"></div>
          <div class="spinner-face">🤖</div>
        </div>
        <p class="loading-main">AI가 자료를 분석하고 있어요...</p>
        <p class="loading-sub">잠시만 기다려주세요</p>
        <div class="progress-track wide">
          <div class="progress-fill" style="width: 73%"></div>
        </div>

        <div class="tip-box">
          <p class="tip-title">📍 Tip</p>
          <p class="tip-text">
            분석이 완료되면 요약과 퀴즈가<br />자동으로 생성돼요.
          </p>
        </div>
      </div>
    </template>

    <template id="tpl-4">
      <div class="scr scr-summary">
        <div class="scr-header-icon">
          <span class="badge-icon">🧾</span>
          <h2 class="scr-title">AI 요약</h2>
        </div>
        <p class="file-chip">📄 인공지능 개론.pdf</p>

        <section class="card">
          <p class="card-title">핵심 요약</p>
          <ul class="bullet-list">
            <li>인공지능은 인간의 학습 능력을 컴퓨터로 구현한 기술입니다.</li>
            <li>머신러닝은 인공지능의 한 분야로, 데이터를 통해 학습합니다.</li>
            <li>딥러닝은 인공신경망을 기반으로 인공지능을 발전시킵니다.</li>
            <li>
              AI는 다양한 분야에서 활용되고 있어, 미래 사회에 큰 영향을
              미칩니다.
            </li>
          </ul>
        </section>

        <p class="section-label">핵심 키워드</p>
        <div class="chip-row">
          <span class="chip">AI</span>
          <span class="chip">머신러닝</span>
          <span class="chip">딥러닝</span>
          <span class="chip">데이터</span>
          <span class="chip">알고리즘</span>
          <span class="chip">신경망</span>
          <span class="chip">학습</span>
          <span class="chip">예측</span>
        </div>

        <button class="btn btn-primary block">퀴즈 만들기</button>
      </div>
    </template>

    <template id="tpl-5">
      <div class="scr scr-quizsetup">
        <h2 class="scr-title">개인 맞춤 퀴즈</h2>
        <p class="scr-sub">나에게 맞는 퀴즈를 만들어보세요!</p>

        <p class="section-label">난이도 선택</p>
        <div class="option-row">
          <button class="opt-btn">쉬움</button>
          <button class="opt-btn active">보통</button>
          <button class="opt-btn">어려움</button>
        </div>

        <p class="section-label">문제 수 선택</p>
        <div class="option-row">
          <button class="opt-btn">5개</button>
          <button class="opt-btn active">10개</button>
          <button class="opt-btn">20개</button>
        </div>

        <p class="section-label">문제 유형 선택</p>
        <div class="option-row">
          <button class="opt-btn">객관식</button>
          <button class="opt-btn">주관식</button>
          <button class="opt-btn active">혼합형</button>
        </div>

        <button class="btn btn-primary block">퀴즈 시작</button>
      </div>
    </template>

    <template id="tpl-6">
      <div class="scr scr-quizplay">
        <div class="quiz-top">
          <button class="back-arrow">←</button>
          <span class="quiz-count">1 / 10</span>
        </div>
        <div class="progress-track wide">
          <div class="progress-fill" style="width: 10%"></div>
        </div>

        <p class="q-label">
          Q1. 다음 중 인공지능에 대한 설명으로 가장 적절한 것은?
        </p>

        <div class="answer-list">
          <button class="answer-opt">
            ① 인간의 감정을 완전히 대체하는 기술이다.
          </button>
          <button class="answer-opt selected">
            ② 데이터를 학습하여 문제를 해결하는 기술이다.
          </button>
          <button class="answer-opt">
            ③ 컴퓨터가 스스로 하드웨어를 만드는 기술이다.
          </button>
          <button class="answer-opt">
            ④ 인터넷을 통해 정보를 검색하는 기술이다.
          </button>
        </div>

        <button class="btn btn-primary block">다음 문제</button>
      </div>
    </template>

    <template id="tpl-7">
      <div class="scr scr-answer">
        <div class="result-circle correct">✔</div>
        <p class="result-text">정답입니다!</p>

        <section class="card">
          <p class="card-title">해설</p>
          <p class="card-desc">
            인공지능은 데이터를 학습하고 이를 이용해 문제를 해결하는 기술입니다.
          </p>
        </section>

        <button class="btn btn-primary block">다음 문제</button>
      </div>
    </template>

    <template id="tpl-8">
      <div class="scr scr-report">
        <h2 class="scr-title">학습 분석 리포트</h2>

        <div class="donut-row">
          <div class="donut"><span>85%</span></div>
          <div class="donut-stats">
            <p><strong>17개</strong> 정답</p>
            <p><strong>3개</strong> 오답</p>
            <p><strong>20개</strong> 총 문제</p>
          </div>
        </div>

        <p class="section-label">영역별 분석</p>
        <div class="bar-item">
          <span>개념 이해</span>
          <div class="bar-track">
            <div class="bar-fill" style="width: 90%"></div>
          </div>
          <span class="bar-pct">90%</span>
        </div>
        <div class="bar-item">
          <span>기억력</span>
          <div class="bar-track">
            <div class="bar-fill" style="width: 80%"></div>
          </div>
          <span class="bar-pct">80%</span>
        </div>
        <div class="bar-item">
          <span>응용력</span>
          <div class="bar-track">
            <div class="bar-fill" style="width: 75%"></div>
          </div>
          <span class="bar-pct">75%</span>
        </div>

        <div class="feedback-box">
          <p class="fb-title">AI 피드백</p>
          <p class="fb-line good">✔ 개념 이해가 매우 뛰어나요!</p>
          <p class="fb-line good">✔ 기억력이 좋은 편이에요.</p>
          <p class="fb-line warn">⚠ 응용 문제를 더 연습해보세요.</p>
        </div>
      </div>
    </template>

    <template id="tpl-9">
      <div class="scr scr-wrong">
        <h2 class="scr-title">오답노트</h2>
        <div class="tab-pill-row">
          <button class="pill active">전체</button>
          <button class="pill">복습 예정</button>
          <button class="pill">복습 완료</button>
        </div>

        <section class="card wrong-card">
          <p class="wq">Q3. 인공지능의 한 분야가 아닌 것은?</p>
          <small class="wq-meta">학습 예정일: 2일 후</small>
        </section>
        <section class="card wrong-card">
          <p class="wq">Q7. 딥러닝에 대한 설명으로 옳지 않은 것은?</p>
          <small class="wq-meta">학습 예정일: 3일 후</small>
        </section>
        <section class="card wrong-card">
          <p class="wq">Q12. 다음 중 머신러닝의 특징이 아닌 것은?</p>
          <small class="wq-meta">학습 예정일: 5일 후</small>
        </section>

        <button class="btn btn-primary block">모두 복습 완료로 표시</button>
      </div>
    </template>

    <template id="tpl-10">
      <div class="scr scr-history">
        <h2 class="scr-title">이전 학습 기록</h2>

        <section class="card history-card">
          <div class="hist-icon">📘</div>
          <div class="hist-meta">
            <strong>머신러닝 기초</strong>
            <small>학습일: 2024.05.10 · 정답률: 80%</small>
          </div>
        </section>
        <section class="card history-card">
          <div class="hist-icon">📗</div>
          <div class="hist-meta">
            <strong>딥러닝 개론</strong>
            <small>학습일: 2024.05.15 · 정답률: 88%</small>
          </div>
        </section>
        <section class="card history-card">
          <div class="hist-icon">📙</div>
          <div class="hist-meta">
            <strong>데이터 분석</strong>
            <small>학습일: 2024.05.20 · 정답률: 75%</small>
          </div>
        </section>

        <button class="btn btn-ghost block">더 보기</button>
      </div>
    </template>

    <template id="tpl-11">
      <div class="scr scr-connect">
        <h2 class="scr-title">이전 학습과의 연결</h2>

        <div class="connect-flow">
          <div class="flow-node">머신러닝 기초</div>
          <div class="flow-arrow">↓</div>
          <div class="flow-node">딥러닝 개론</div>
          <div class="flow-arrow">↓</div>
          <div class="flow-node current">인공지능 개론</div>
        </div>

        <p class="section-label">연결 설명</p>
        <p class="connect-desc">
          이번 학습은 딥러닝 개념을 기반으로 설계되어, 관련 학습과 연결 방법을
          이해하는 데 도움이 됩니다.
        </p>

        <button class="btn btn-primary block">자세히 보기</button>
      </div>
    </template>

    <template id="tpl-12">
      <div class="scr scr-flash">
        <h2 class="scr-title">플래시카드</h2>

        <div class="flashcard" id="flashcard">
          <div class="flash-inner">
            <div class="flash-face front">
              <span class="flash-q-label">Q</span>
              <p>인공지능이란 무엇인가요?</p>
            </div>
            <div class="flash-face back">
              <span class="flash-q-label">A</span>
              <p>
                인간의 학습 능력, 추론 능력 등을 컴퓨터 시스템에서 구현한
                기술입니다.
              </p>
            </div>
          </div>
        </div>

        <div class="flash-nav">
          <button class="nav-circle">‹</button>
          <span>1 / 20</span>
          <button class="nav-circle">›</button>
        </div>

        <button class="btn btn-primary block">카드 섞기</button>
      </div>
    </template>

    <script src="script.js"></script>
  </body>
</html>
